name: Daily Player Selection

on:
  schedule:
    # Uruchom codziennie o 00:01 UTC
    - cron: '1 0 * * *'
  workflow_dispatch:  # Pozwól na ręczne uruchomienie

jobs:
  select-daily-player:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run daily player selection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          cd scripts
          python update_daily.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily player selection failed!"
          # Tutaj można dodać powiadomienie (np. Discord, Slack, email)
