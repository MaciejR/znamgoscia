name: Weekly Database Update

on:
  schedule:
    # Uruchom w każdą niedzielę o 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:  # Pozwól na ręczne uruchomienie

jobs:
  update-database:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Scraping może trwać długo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run database update (scraping)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scripts
          python scrape_players.py

      - name: Notify on success
        if: success()
        run: |
          echo "Database update completed successfully!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Database update failed!"
          # Tutaj można dodać powiadomienie (np. Discord, Slack, email)
